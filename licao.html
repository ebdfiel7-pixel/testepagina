<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#07111f">
  <title>Lição - EBD Fiel</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #f7b24d;
      --primary-2: #ff9800;
      --dark: #102131;
      --bg: #eef2f7;
      --shadow: 0 14px 40px rgba(15, 23, 42, 0.10);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #f6f8fb 0%, #eef2f7 100%);
      color: #162331;
      opacity: 0;
      transform: translateY(10px);
      animation: pageEnter 0.35s ease forwards;
    }

    @keyframes pageEnter {
      to { opacity: 1; transform: translateY(0); }
    }

    .content {
      padding: 24px 22px;
      line-height: 1.7;
      color: #334155;
    }

    .content p {
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 1rem;
    }

    .content h3 {
      font-size: 1.1rem !important;
      font-weight: 700 !important;
      margin: 1.2rem 0 0.5rem 0 !important;
      color: #334155 !important;
      border: none !important;
    }

    .content h4 {
      font-size: 1rem !important;
      font-weight: 600 !important;
      margin: 0.8rem 0 0.3rem 0 !important;
      color: #475569 !important;
    }

    .content .destaque {
      font-weight: 700 !important;
      color: #1e3a8a !important;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(7,17,31,0.95);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 36px;
      padding: 0 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: var(--dark);
      font-weight: 800;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .topbar-title {
      font-weight: 700;
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
    }

    .card {
      background: white;
      box-shadow: var(--shadow);
      border-radius: 0 0 24px 24px;
      overflow: hidden;
    }

    .cover-header {
      width: 100%;
    }

    .cover-header img {
      width: 100%;
      height: auto;
      display: block;
    }

    .footer-credits {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      padding: 24px 22px;
      text-align: center;
      border-top: 3px solid #f7b24d;
      margin-top: 20px;
    }

    .footer-credits .logo {
      margin-bottom: 12px;
    }

    .footer-credits .logo img {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      margin: 0 auto;
    }

    .footer-credits h4 {
      color: #f7b24d;
      font-size: 1.1rem;
      margin-bottom: 8px;
    }

    .footer-credits p {
      color: #a7bacb;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    .footer-credits .verse {
      font-style: italic;
      color: #94a3b8;
      font-size: 0.8rem;
      margin-top: 10px;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 15px 0 10px;
    }

    .social-links a {
      color: #a7bacb;
      font-size: 1.3rem;
      transition: color 0.2s, transform 0.2s;
      display: inline-block;
    }

    .social-links a:hover {
      color: #f7b24d;
      transform: translateY(-2px);
    }

    .download-pdf {
      text-align: center;
      padding: 16px 20px;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
    }

    .download-pdf-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: none;
      border: 1px solid #cbd5e1;
      border-radius: 40px;
      color: #475569;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .download-pdf-btn:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
      color: #1e293b;
    }

    .download-pdf-btn i {
      color: #dc2626;
    }

    .share-wrap {
      padding: 16px;
      display: flex;
      justify-content: center;
    }

    .share-btn {
      padding: 14px 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, #1688dc, #0267b3);
      color: white;
      font-weight: 800;
      border: none;
      cursor: pointer;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    @media (max-width: 640px) {
      .content {
        padding: 18px;
      }
    }

    @media print {
      .topbar, .share-wrap, .download-pdf, .back-btn {
        display: none !important;
      }
      
      .footer-credits {
        background: none !important;
        border-top: 1px solid #ccc !important;
        margin-top: 40px !important;
        page-break-inside: avoid;
      }
      
      .footer-credits h4, .footer-credits p, .footer-credits .verse {
        color: #333 !important;
      }
      
      body {
        background: white !important;
        padding: 0 !important;
        margin: 0 !important;
      }
      
      .card {
        box-shadow: none !important;
      }
      
      .content {
        page-break-inside: auto;
      }
      
      h1, h2, h3, h4, h5, h6, p, .footer-credits {
        page-break-inside: avoid;
        break-inside: avoid;
      }
    }

    .reading-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin: 20px 0;
      background: #f1f5f9;
      border-radius: 20px;
      padding: 16px;
    }

    .reading-day {
      padding: 8px 12px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      font-size: 0.9rem;
    }

    .reading-day strong {
      color: #f7b24d;
      display: block;
      margin-bottom: 4px;
    }

    .content blockquote {
      background: #f1f5f9;
      padding: 16px 20px;
      border-left: 4px solid #f7b24d;
      border-radius: 12px;
      margin: 20px 0;
      font-style: italic;
      color: #334155;
    }

    .content hr {
      margin: 24px 0;
      border: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #cbd5e1, transparent);
    }

    .task-list {
      list-style: none;
      padding-left: 0;
      margin: 18px 0;
      display: grid;
      gap: 10px;
    }

    .task-list-item {
      list-style: none;
      margin: 0;
      padding: 12px 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid #dbe5f0;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .task-list-item input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      margin: 0;
      border-radius: 7px;
      border: 2px solid #cbd5e1;
      background: #fff;
      position: relative;
      cursor: default;
      flex-shrink: 0;
    }

    .task-list-item input[type="checkbox"]:checked {
      background: linear-gradient(135deg, #f7b24d, #ff9800);
      border-color: #f59e0b;
    }

    .task-list-item input[type="checkbox"]:checked::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 1px;
      width: 5px;
      height: 10px;
      border: solid #102131;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .task-list-item:has(input[type="checkbox"]:checked) {
      border-color: rgba(247, 178, 77, 0.45);
      background: linear-gradient(180deg, #fffaf0 0%, #fff7ed 100%);
    }

    .task-list-item:has(input[type="checkbox"]:checked) strong {
      color: #d97706;
    }

    blockquote {
      background: #f1f5f9;
      border-left: 4px solid #f7b24d;
      border-radius: 0 12px 12px 0;
      padding: 12px 20px;
      margin: 16px 0;
      color: #475569;
    }

    code {
      background: #e2e8f0;
      padding: 2px 6px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.9em;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <button class="back-btn" onclick="voltar()">
      <i class="fas fa-arrow-left"></i>
      VOLTAR
    </button>
    <div class="topbar-title" id="tituloTopbar">Lição</div>
  </div>

  <main class="page">
    <div class="card">
      <div id="app"></div>

      <div class="download-pdf">
        <button class="download-pdf-btn" id="downloadPDFBtn">
          <i class="fas fa-file-pdf"></i>
          Salvar como PDF
        </button>
      </div>

      <div class="share-wrap">
        <button class="share-btn" id="shareBtn">
          <i class="fas fa-share-alt"></i> Compartilhar app
        </button>
      </div>
    </div>
  </main>

  <script>
    let licaoAtual = null;

    function voltar() {
      const destino = sessionStorage.getItem("voltarPara") || "#home";
      window.location.replace("./index.html" + destino);
    }

    function processarDestaques(html) {
      const textosDestacados = [
        'TEXTO ÁUREO', 'VERDADE APLICADA', 'TEXTOS DE REFERÊNCIA',
        'ANÁLISE GERAL', 'INTRODUÇÃO', 'APOIO PEDAGÓGICO', 
        'APLICAÇÃO PRÁTICA', 'EU ENSINEI QUE:', 'CONCLUSÃO'
      ];
      
      let resultado = html;
      
      textosDestacados.forEach(texto => {
        const textoEscapado = texto.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        
        // Caso 1: <p><strong>TITULO</strong></p> seguido de <p>texto</p>
        let regex = new RegExp(`<p><strong>(${textoEscapado})<\\/strong><\\/p>\\s*<p>([\\s\\S]*?)<\\/p>`, 'gi');
        resultado = resultado.replace(regex, `<p><strong class="destaque">$1</strong> $2</p>`);
        
        // Caso 2: <p><strong>TITULO</strong></p> seguido de texto direto
        regex = new RegExp(`<p><strong>(${textoEscapado})<\\/strong><\\/p>\\s*([^<]+)`, 'gi');
        resultado = resultado.replace(regex, `<p><strong class="destaque">$1</strong> $2</p>`);
        
        // Caso 3: já está no mesmo parágrafo
        regex = new RegExp(`(<p>)(<strong>)(${textoEscapado})(<\\/strong>)(\\s*)([^<]*)`, 'gi');
        resultado = resultado.replace(regex, `$1<strong class="destaque">$3</strong>$5$6`);
      });
      
      // Processar TEXTOS DE REFERÊNCIA especificamente
      const regexReferencias = /<p><strong>TEXTOS DE REFERÊNCIA<\/strong><\/p>\s*((?:<p>[^<]*<\/p>\s*)+)/gi;
      resultado = resultado.replace(regexReferencias, (match, conteudo) => {
        const textoLimpo = conteudo.replace(/<p>/g, '').replace(/<\/p>/g, '<br>');
        return `<p><strong class="destaque">TEXTOS DE REFERÊNCIA</strong> ${textoLimpo}</p>`;
      });
      
      return resultado;
    }

    function montarPaginaDaLicao(licao) {
      const isYouth = licao.tipo === "youth";
      const imagemCabecalho = isYouth ? "./img/jovens.png" : "./img/adultos.png";
      
      let conteudoProcessado = licao.conteudo || "<p>Conteúdo não disponível.</p>";
      conteudoProcessado = processarDestaques(conteudoProcessado);

      return `
        <div class="cover-header">
          <img src="${imagemCabecalho}" alt="Cabeçalho da lição" loading="eager">
        </div>
        <div class="content">
          ${conteudoProcessado}
        </div>
        <div class="footer-credits">
          <div class="logo">
            <img src="./ebdfiel.png" alt="EBD Fiel">
          </div>
          <h4>EBD Fiel</h4>
          <p>Fiel à Palavra. Relevante para hoje.</p>
          <div class="social-links">
            <a href="#" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" target="_blank" rel="noopener noreferrer" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" target="_blank" rel="noopener noreferrer" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
            <a href="#" target="_blank" rel="noopener noreferrer" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
          </div>
          <p class="verse">✝️ "Examinai as Escrituras" - João 5:39</p>
        </div>
      `;
    }

    function renderErro(msg) {
      document.getElementById("app").innerHTML = `<div style="padding:20px;color:red;"><h2>Erro</h2><p>${msg}</p></div>`;
    }

    function baixarPDF() {
      if (!licaoAtual) {
        alert("Nenhuma lição carregada.");
        return;
      }

      const btn = document.getElementById('downloadPDFBtn');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Preparando...';
      btn.disabled = true;

      const conteudoOriginal = document.querySelector('.card').cloneNode(true);
      const iframe = document.createElement('iframe');
      iframe.style.position = 'absolute';
      iframe.style.width = '0';
      iframe.style.height = '0';
      iframe.style.border = 'none';
      document.body.appendChild(iframe);
      
      const doc = iframe.contentWindow.document;
      doc.open();
      doc.write(`
        <!DOCTYPE html>
        <html>
        <head><meta charset="UTF-8"><title>${licaoAtual.titulo || 'Lição'} - EBD Fiel</title>
        <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body { font-family: 'Inter', Arial, sans-serif; padding: 20px; background: white; color: #162331; }
          .cover-header img { width: 100%; height: auto; }
          .content { padding: 20px; line-height: 1.7; }
          .content p { font-size: 1rem; line-height: 1.7; margin-bottom: 1rem; }
          .content h3 { font-size: 1.1rem; font-weight: 700; margin: 1.2rem 0 0.5rem 0; color: #334155; }
          .content .destaque { font-weight: 700 !important; color: #1e3a8a !important; }
          .footer-credits { text-align: center; padding: 20px; margin-top: 30px; border-top: 2px solid #f7b24d; }
          .footer-credits .logo img { width: 50px; height: 50px; margin: 0 auto; }
          .footer-credits h4 { color: #f7b24d; margin: 10px 0 5px; }
          .footer-credits p { color: #666; font-size: 0.85rem; }
          .social-links { display: flex; justify-content: center; gap: 20px; margin: 15px 0; }
          .social-links a { color: #666; font-size: 1.3rem; text-decoration: none; }
          @media print { body { padding: 0; } }
        </style>
        </head>
        <body>${conteudoOriginal.outerHTML}</body>
        </html>
      `);
      doc.close();
      
      setTimeout(() => {
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
        setTimeout(() => {
          document.body.removeChild(iframe);
          btn.innerHTML = originalText;
          btn.disabled = false;
        }, 1000);
      }, 500);
    }

    try {
      const raw = sessionStorage.getItem("licaoAtual");
      if (!raw) {
        renderErro("Nenhuma lição encontrada.");
      } else {
        licaoAtual = JSON.parse(raw);
        document.title = (licaoAtual.titulo || "Lição") + " - EBD Fiel";
        document.getElementById("tituloTopbar").textContent = licaoAtual.titulo || "Lição";
        document.getElementById("app").innerHTML = montarPaginaDaLicao(licaoAtual);
      }
    } catch (e) {
      renderErro("Erro ao carregar a página.");
    }

    document.getElementById("shareBtn").addEventListener("click", async () => {
      const url = "https://ebdfiel.com.br/";
      if (navigator.share) {
        try {
          await navigator.share({ title: "EBD Fiel", text: "Acesse as lições da Escola Bíblica Dominical:", url });
        } catch (err) { console.log("Compartilhamento cancelado"); }
      } else {
        await navigator.clipboard.writeText(url);
        alert("Link copiado para a área de transferência!");
      }
    });

    document.getElementById("downloadPDFBtn").addEventListener("click", baixarPDF);
  </script>

</body>
</html>
